# default_configs/narrowband_impaired_train_all.yaml
# narrowband, with impairments, all per-signals classes
schema_version: "2.1.0"
dataset_id: "narrowband_impaired_train_all"
dataset_length: 5_700_000   # 100k items per signal class (57 classes)
seed: 1234567892
impairment_level: 2  # impaired, wireless channel-like conditions

output:
  representation: "iq" # time series I/Q format

signal_sampling:
  mode: "per_signal" # equal probability per signal class

# narrowband: single signal channelized, quasi-time-aligned, moderate bandwidth
dataset_metadata:
  sample_rate: 10_000_000
  num_iq_samples_dataset: 4096
  fft_size: 64
  fft_stride: 64

  # narrowband
  num_signals_min: 1
  num_signals_max: 1
  cochannel_overlap_probability: 0.0  # irrelevant for narrowband

  # wide SNR range
  snr_db_min: 0.0
  snr_db_max: 50.0
  noise_power_db: 0.0

  # typical narrowand: long bursts near full time duration
  signal_duration_in_samples_min: 3276    # ~0.8 * 4096
  signal_duration_in_samples_max: 4096    # 1.0 * 4096

  bandwidth_min: 2500000
  bandwidth_max: 3333333

  signal_center_freq_min: -2500000
  signal_center_freq_max: 2499999
  frequency_min: -2500000
  frequency_max: 2499999
  